<script>
  // 👇 MOVE ALL YOUR JS HERE
  function playMusic() {
    document.getElementById("music").play();
  }

  document.addEventListener("click", function() {
  let music = document.getElementById("music");

  music.volume = 0;  // start from 0
  music.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 0.3) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

}, { once: true });


  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.querySelector(".hearts").appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);

  function typeFinalMessage() {
  const text = "No matter what happens... you will always be special to me ❤️";
  let i = 0;

  function typing() {
    if (i < text.length) {
      document.getElementById("final-text").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 60);
    }
  }

  typing();
}
</script>

<audio id="music" loop>

<div class="container">
  <h1 id="title"></h1>
  <p id="question">Loading...</p>
  <div id="answers"></div>
</div>

<script>
  const friendName = "Buddy"; 
document.getElementById("title").innerHTML =
  "Hey <span class='name'>" + friendName + "</span> 😎, let’s see how well you know me!";

  const quiz = [
    {
      question: "Where did we first meet?",
      answers: ["Banquet", "Park", "Online"],
      correct: 0
    },
    {
      question: "My favorite food?",
      answers: ["Pizza", "Burger", "Momos"],
      correct: 1
    },
    {
      question: "Who is more funny?",
      answers: ["Me", "You", "Both 😂"],
      correct: 2
    },
    {
      question: "What is my favorite timepass?",
      answers: ["Gaming", "Sleeping", "Scrolling"],
      correct: 0
    },
    {
      question: "Who texts first most of the time?",
      answers: ["Me", "You", "No one"],
      correct: 0
    },
    {
      question: "Our favorite hangout place?",
      answers: ["Calls", "Snapchat", "Insta"],
      correct: 2
    },
    {
      question: "What do I hate the most?",
      answers: ["Waiting", "Studying", "Waking up early"],
      correct: 2
    },
    {
      question: "Who is more lazy?",
      answers: ["Me", "You", "Equal 😂"],
      correct: 0
    },
    {
      question: "My dream destination?",
      answers: ["Goa", "Spiti", "Ladakh"],
      correct: 1
    },
    {
      question: "Why are we best friends?",
      answers: ["Luck", "Same vibe", "We’re crazy 😂"],
      correct: 1
    }
  ];

  let current = 0;
  let score = 0;

  function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((ans, index) => {
      const btn = document.createElement("button");
      btn.innerText = ans;
      btn.onclick = () => checkAnswer(index);
      answersDiv.appendChild(btn);
    });
  }

  function checkAnswer(index) {
    if (index === quiz[current].correct) {
      score++;
    }
    current++;

    if (current < quiz.length) {
      loadQuestion();
    } else {
      showResult();
    }
  }
function showResult() {
  let message = "";
  let emoji = "";

  if (score === quiz.length) {
    message = "Perfect score! You're my soulmate bestie ❤️🔥";
    emoji = "🏆";
  } else if (score >= 7) {
    message = "You're a true best friend 😎❤️";
    emoji = "🎉";
  } else if (score >= 4) {
    message = "Not bad… but you can do better 😜";
    emoji = "🙂";
  } else {
    message = "Fake friend detected 🚨😂";
    emoji = "😆";
  }

  document.body.innerHTML = `
    <div class="result-box">
      <h1 class="result-emoji">${emoji}</h1>
      <h2 class="result-score">Score: ${score}/${quiz.length}</h2>
      <p class="result-message">${message}</p>
      <p class="result-final">No matter what ${friendName}, you're my best friend ❤️</p>

      <button onclick="location.reload()">Play Again 🔄</button>
      <button onclick="showMessage()">Click for Surprise 🎁</button>
    </div>
  `;

  // 🎉 CONFETTI HERE
  confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 }
  });
}
function showMessage() {
  document.body.innerHTML = `
    <div class="final-screen">
      <h1 id="final-text"></h1>
    </div>
  `;

  typeFinalMessage();
}
  loadQuestion();
</script>
